services:
  - type: web
    name: sparklo-in
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8081
      - key: FRONTEND_URL
        value: https://sparklo-in.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://sparklo-in.vercel.app
      - key: WEBSOCKET_ALLOWED_ORIGINS
        value: https://sparklo-in.vercel.app
    healthCheckPath: /actuator/health
