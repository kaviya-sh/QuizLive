spring:
  application:
    name: quizlive
  main:
    lazy-initialization: false
    allow-bean-definition-overriding: false

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-noisy-brook-aplc69tm.c-7.us-east-1.aws.neon.tech/quizlive_prod?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:neondb_owner}
    password: ${SPRING_DATASOURCE_PASSWORD:npg_Wd59yJgvZpXT}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      validation-timeout: 5000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    locations: classpath:db/migration
    connect-retries: 3
    connect-retries-interval: 1

  data:
    redis:
      url: ${REDIS_URL:rediss://:gQAAAAAAATG7AAIgcDJlZWU3ODliZjRjNDA0MjM4OTg2YjU2NjM1MjBjMWE3Ng@rational-swan-78267.upstash.io:6379}
      timeout: 3000ms
      connect-timeout: 3000ms
      lettuce:
        shutdown-timeout: 0ms
        pool:
          enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: sparklo.team.in@gmail.com
    password: cuckcgkrxtfhxmzo
    from: sparklo.team.in@gmail.com
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
